<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>WoW Classic — Dungeons Compendium</title>

  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="header-atmosphere"></div>
  <div class="header-runes" aria-hidden="true">
    <span class="rune r1">✦</span>
    <span class="rune r2">◆</span>
    <span class="rune r3">✦</span>
    <span class="rune r4">◆</span>
    <span class="rune r5">✦</span>
    <span class="rune r6">◆</span>
    <span class="rune r7">✦</span>
    <span class="rune r8">◆</span>
  </div>
  <div class="header-content">
    <div class="header-logo-container">
      <div class="header-logo-halo"></div>
      <img class="header-logo" src="assets/logo.png" alt="WoW Classic Dungeons Compendium">
    </div>
    <p class="site-subtitle">Every Quest · Every Boss · Every Reward</p>
  </div>
  <div class="header-divider">
    <div class="header-divider-line header-divider-alliance"></div>
    <div class="header-divider-center">
      <span class="divider-diamond">◆</span>
    </div>
    <div class="header-divider-line header-divider-horde"></div>
  </div>
</header>

<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" type="text" id="searchInput" placeholder="Search quests, NPCs, locations…">
  </div>
  <div class="filter-group" id="filterGroup">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="has-items">Has Gear</button>
    <button class="filter-btn" data-filter="completed">Completed</button>
    <button class="filter-btn" data-filter="incomplete">Incomplete</button>
  </div>
  <div class="faction-group" id="factionGroup">
    <button class="faction-btn active" data-faction="all">All Factions</button>
    <button class="faction-btn faction-btn-alliance" data-faction="Alliance"><img src="assets/icons/alliance.png" alt="Alliance" class="faction-icon"> Alliance</button>
    <button class="faction-btn faction-btn-horde" data-faction="Horde"><img src="assets/icons/horde.png" alt="Horde" class="faction-icon"> Horde</button>
  </div>
  <div class="controls-right">
    <button class="view-btn active" id="gridViewBtn" title="Grid view">⊞</button>
    <button class="view-btn" id="listViewBtn" title="List view">☰</button>
  </div>
</div>

<nav class="dungeon-tabs" id="dungeonTabs"></nav>

<div class="main">
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-title">🧭 Quest Locations</div>
        <div class="sidebar-body">
          <div id="locationList"></div>
        </div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-title">💀 Encounters</div>
        <div class="sidebar-body">
          <div id="encounterList"></div>
        </div>
      </div>
    </aside>
    <div class="content">
      <div class="dungeon-header" id="dungeonHeader">
        <div class="dungeon-icon" id="dungeonHeaderIcon">🏰</div>
        <div class="dungeon-info">
          <div class="dungeon-name" id="dungeonHeaderName">Select a Dungeon</div>
          <div class="dungeon-meta" id="dungeonHeaderMeta"></div>
          <div id="dungeonHeaderGuides"></div>
        </div>
        <div class="dungeon-progress">
          <div class="progress-label">QUEST PROGRESS</div>
          <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar" style="width:0%"></div></div>
          <div class="progress-fraction" id="progressFraction">0 / 0</div>
        </div>
      </div>
      <div class="stats-bar" id="statsBar"></div>
      <div id="quest-container" class="grid-view"></div>
    </div>
  </div>
</div>

<!-- Loading Screen Lightbox -->
<div id="loadingScreenLightbox" class="ls-lightbox" aria-hidden="true">
  <div class="ls-lightbox-backdrop"></div>
  <img id="loadingScreenLightboxImg" class="ls-lightbox-img" src="" alt="">
</div>

<!-- Map Modal -->
<div id="mapModal" class="map-modal" aria-hidden="true">
  <div class="map-modal-backdrop"></div>
  <div class="map-modal-panel" role="dialog" aria-labelledby="mapModalTitle">
    <div class="map-modal-header">
      <span class="map-modal-title" id="mapModalTitle"></span>
      <a id="mapModalWowheadLink" href="#" target="_blank" rel="noopener noreferrer" class="map-wowhead-link"><img src="assets/icons/wowhead.png" class="map-wowhead-logo" alt="Wowhead"> View on Wowhead ↗</a>
      <button class="map-modal-close" id="mapModalClose" aria-label="Close map">✕</button>
    </div>
    <div class="map-level-nav" id="mapLevelNav"></div>
    <div class="map-modal-viewport" id="mapModalViewport">
      <img id="mapModalImg" src="" alt="Zone map" draggable="false">
      <div class="map-no-image" id="mapNoImage">Map not available</div>
    </div>
    <div class="map-modal-footer">
      <button class="map-zoom-btn" id="mapZoomOut" title="Zoom out">−</button>
      <button class="map-zoom-btn map-zoom-btn--fit" id="mapZoomReset" title="Fit to view">⛶</button>
      <button class="map-zoom-btn" id="mapZoomIn" title="Zoom in">+</button>
    </div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>var whTooltips = {colorLinks: false, iconizeLinks: true, renameLinks: false, hide: {sendmail: true, sellprice: false}};</script>
<script src="https://wow.zamimg.com/js/tooltips.js"></script>
</body>
</html>
