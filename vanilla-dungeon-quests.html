<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vanilla WoW — Dungeon Quest Compendium</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c8a84b;
    --gold-light: #f0d080;
    --gold-dim: #7a6228;
    --red: #8b1a1a;
    --red-bright: #cc2222;
    --bg-dark: #0a0805;
    --bg-mid: #12100c;
    --bg-panel: #1a1610;
    --bg-card: #201c14;
    --border: #3a3020;
    --border-gold: #5a4a20;
    --text-main: #d4c090;
    --text-dim: #8a7a50;
    --text-bright: #f0e0a0;
    --blue-rare: #4a90d9;
    --green-uncommon: #1eff00;
    --white-common: #ffffff;
    --purple-epic: #a335ee;
    --orange-legendary: #ff8000;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-dark);
    color: var(--text-main);
    font-family: 'Crimson Pro', Georgia, serif;
    font-size: 16px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Parchment texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(200, 150, 50, 0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(139, 26, 26, 0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  .site-header {
    position: relative;
    text-align: center;
    padding: 48px 20px 32px;
    border-bottom: 2px solid var(--border-gold);
    background: linear-gradient(180deg, #0f0c08 0%, var(--bg-dark) 100%);
    overflow: hidden;
  }
  .site-header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c8a84b' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    opacity: 1;
  }
  .header-emblem {
    font-size: 2rem;
    margin-bottom: 8px;
    opacity: 0.6;
    animation: pulse-glow 3s ease-in-out infinite;
  }
  @keyframes pulse-glow {
    0%, 100% { opacity: 0.6; text-shadow: none; }
    50% { opacity: 0.9; text-shadow: 0 0 20px var(--gold); }
  }
  .site-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.4rem, 4vw, 2.8rem);
    font-weight: 900;
    color: var(--gold-light);
    text-shadow: 0 0 30px rgba(200,168,75,0.5), 2px 2px 4px rgba(0,0,0,0.8);
    letter-spacing: 0.05em;
    line-height: 1.2;
  }
  .site-subtitle {
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    color: var(--gold-dim);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-top: 8px;
  }
  .header-divider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-top: 20px;
  }
  .header-divider::before,
  .header-divider::after {
    content: '';
    height: 1px;
    width: 120px;
    background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
  }
  .header-divider-icon { color: var(--gold); font-size: 1.1rem; }

  /* ── CONTROLS ── */
  .controls {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,8,5,0.97);
    border-bottom: 1px solid var(--border-gold);
    backdrop-filter: blur(8px);
    padding: 12px 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
  }
  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
    max-width: 360px;
  }
  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--gold-dim);
    pointer-events: none;
  }
  .search-input {
    width: 100%;
    padding: 8px 12px 8px 36px;
    background: var(--bg-card);
    border: 1px solid var(--border-gold);
    border-radius: 3px;
    color: var(--text-bright);
    font-family: 'Crimson Pro', serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 8px rgba(200,168,75,0.2);
  }
  .search-input::placeholder { color: var(--text-dim); }

  .filter-group {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .filter-btn {
    padding: 6px 14px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text-dim);
    font-family: 'Cinzel', serif;
    font-size: 0.72rem;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .filter-btn:hover, .filter-btn.active {
    background: linear-gradient(135deg, #2a2010, #1a1508);
    border-color: var(--gold);
    color: var(--gold-light);
    box-shadow: 0 0 8px rgba(200,168,75,0.15);
  }
  .controls-right {
    margin-left: auto;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .view-btn {
    padding: 6px 10px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 1rem;
    transition: all 0.2s;
  }
  .view-btn.active, .view-btn:hover {
    border-color: var(--gold);
    color: var(--gold);
  }
  .quest-count {
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    color: var(--text-dim);
    white-space: nowrap;
  }
  .quest-count span { color: var(--gold); font-weight: 600; }

  /* ── DUNGEON TABS ── */
  .dungeon-tabs {
    display: flex;
    overflow-x: auto;
    background: var(--bg-mid);
    border-bottom: 1px solid var(--border-gold);
    padding: 0 20px;
    gap: 2px;
    scrollbar-width: thin;
    scrollbar-color: var(--gold-dim) transparent;
  }
  .dungeon-tab {
    padding: 10px 16px;
    font-family: 'Cinzel', serif;
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    color: var(--text-dim);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: all 0.2s;
    position: relative;
  }
  .dungeon-tab:hover { color: var(--text-main); }
  .dungeon-tab.active {
    color: var(--gold-light);
    border-bottom-color: var(--gold);
  }
  .tab-level {
    font-size: 0.6rem;
    color: var(--text-dim);
    display: block;
    margin-top: 2px;
    letter-spacing: 0.05em;
  }
  .dungeon-tab.active .tab-level { color: var(--gold-dim); }

  /* ── MAIN LAYOUT ── */
  .main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px 20px;
  }

  /* ── DUNGEON HEADER ── */
  .dungeon-header {
    display: flex;
    align-items: flex-start;
    gap: 20px;
    margin-bottom: 24px;
    padding: 20px 24px;
    background: var(--bg-panel);
    border: 1px solid var(--border-gold);
    border-radius: 4px;
    position: relative;
    overflow: hidden;
  }
  .dungeon-header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .dungeon-icon { font-size: 2.5rem; opacity: 0.8; }
  .dungeon-info { flex: 1; }
  .dungeon-name {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1rem, 2.5vw, 1.6rem);
    color: var(--gold-light);
    text-shadow: 0 0 20px rgba(200,168,75,0.3);
    margin-bottom: 4px;
  }
  .dungeon-meta {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    margin-top: 8px;
  }
  .dungeon-meta-item {
    font-family: 'Cinzel', serif;
    font-size: 0.72rem;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .dungeon-meta-item strong { color: var(--gold); margin-left: 4px; }
  .dungeon-progress {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
    min-width: 140px;
  }
  .progress-label {
    font-family: 'Cinzel', serif;
    font-size: 0.68rem;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }
  .progress-bar-wrap {
    width: 140px;
    height: 8px;
    background: var(--bg-dark);
    border: 1px solid var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold-dim), var(--gold));
    border-radius: 2px;
    transition: width 0.5s ease;
  }
  .progress-fraction {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    color: var(--gold);
  }

  /* ── QUEST GRID / LIST ── */
  #quest-container.grid-view {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
  }
  #quest-container.list-view {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* ── QUEST CARD ── */
  .quest-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    transition: all 0.25s;
    cursor: pointer;
    position: relative;
  }
  .quest-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(200,168,75,0.03) 0%, transparent 60%);
    pointer-events: none;
  }
  .quest-card:hover {
    border-color: var(--gold-dim);
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(0,0,0,0.5), 0 0 12px rgba(200,168,75,0.08);
  }
  .quest-card.completed {
    opacity: 0.55;
  }
  .quest-card.completed .quest-name {
    text-decoration: line-through;
    text-decoration-color: var(--gold-dim);
  }

  .quest-card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px 8px;
    border-bottom: 1px solid var(--border);
  }
  .quest-checkbox {
    width: 18px;
    height: 18px;
    border: 1px solid var(--border-gold);
    border-radius: 2px;
    background: var(--bg-dark);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.65rem;
    color: var(--gold);
    transition: all 0.2s;
  }
  .quest-card.completed .quest-checkbox {
    background: var(--gold-dim);
    border-color: var(--gold);
  }
  .quest-name {
    font-family: 'Cinzel', serif;
    font-size: 0.88rem;
    color: var(--gold-light);
    letter-spacing: 0.02em;
    flex: 1;
    line-height: 1.3;
  }
  .quest-level-badge {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    color: var(--text-dim);
    background: var(--bg-dark);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 2px 6px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .quest-card-body {
    padding: 10px 14px 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .quest-row {
    display: flex;
    gap: 8px;
    font-size: 0.83rem;
    line-height: 1.4;
  }
  .quest-label {
    color: var(--text-dim);
    font-size: 0.72rem;
    font-family: 'Cinzel', serif;
    letter-spacing: 0.06em;
    min-width: 52px;
    flex-shrink: 0;
    text-transform: uppercase;
    padding-top: 1px;
  }
  .quest-value { color: var(--text-main); flex: 1; }
  .quest-value.location { color: #8ab4d4; font-style: italic; }
  .quest-value.xp { color: #84d4a0; font-weight: 600; }
  .quest-value.reward { color: var(--green-uncommon); font-weight: 600; }
  .quest-value.items { color: #c8a0d4; }
  .quest-value.prequest { color: #d4a080; font-style: italic; }
  .quest-value.note { color: var(--text-dim); font-style: italic; font-size: 0.8rem; }

  .quest-card-footer {
    padding: 6px 14px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .xp-pill {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    color: #84d4a0;
    background: rgba(132,212,160,0.08);
    border: 1px solid rgba(132,212,160,0.2);
    border-radius: 2px;
    padding: 2px 8px;
    letter-spacing: 0.05em;
  }
  .reward-pill {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    color: var(--green-uncommon);
    background: rgba(30,255,0,0.06);
    border: 1px solid rgba(30,255,0,0.2);
    border-radius: 2px;
    padding: 2px 8px;
  }
  .complete-btn {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.06em;
    padding: 4px 10px;
    background: transparent;
    border: 1px solid var(--border-gold);
    border-radius: 2px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
    margin-left: auto;
  }
  .complete-btn:hover {
    border-color: var(--gold);
    color: var(--gold-light);
    background: rgba(200,168,75,0.08);
  }
  .quest-card.completed .complete-btn {
    border-color: var(--gold-dim);
    color: var(--gold-dim);
  }

  /* LIST VIEW OVERRIDES */
  .list-view .quest-card {
    border-radius: 3px;
  }
  .list-view .quest-card:hover { transform: none; }
  .list-view .quest-card-header {
    padding: 10px 14px;
    border-bottom: none;
    flex-wrap: wrap;
  }
  .list-view .quest-card-body { display: none; }
  .list-view .quest-card.expanded .quest-card-body { display: flex; }
  .list-view .quest-card-footer { display: none; }
  .list-view .quest-card.expanded .quest-card-footer { display: flex; }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
    grid-column: 1/-1;
  }
  .empty-state-icon { font-size: 3rem; margin-bottom: 12px; opacity: 0.4; }
  .empty-state-text {
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    letter-spacing: 0.1em;
  }

  /* ── STATS BAR ── */
  .stats-bar {
    display: flex;
    gap: 24px;
    padding: 12px 24px;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .stat-item { display: flex; flex-direction: column; gap: 2px; }
  .stat-num {
    font-family: 'Cinzel Decorative', serif;
    font-size: 1.2rem;
    color: var(--gold-light);
    line-height: 1;
  }
  .stat-label {
    font-family: 'Cinzel', serif;
    font-size: 0.62rem;
    color: var(--text-dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .stat-divider {
    width: 1px;
    background: var(--border);
    align-self: stretch;
  }

  /* ── TOOLTIP ── */
  .tooltip-wrap { position: relative; display: inline-block; }
  .tooltip {
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    background: #1a1a0f;
    border: 1px solid var(--gold-dim);
    border-radius: 3px;
    padding: 8px 12px;
    font-size: 0.78rem;
    color: var(--text-main);
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 200;
    box-shadow: 0 4px 16px rgba(0,0,0,0.7);
  }
  .tooltip-wrap:hover .tooltip { opacity: 1; }

  /* ── NO QUESTS ── */
  .no-dungeon-quests {
    text-align: center;
    padding: 48px 20px;
    color: var(--text-dim);
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    letter-spacing: 0.08em;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg-panel);
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg-dark); }
  ::-webkit-scrollbar-thumb { background: var(--border-gold); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--gold-dim); }

  /* ── ANIMATIONS ── */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .quest-card {
    animation: fadeInUp 0.3s ease both;
  }
  .quest-card:nth-child(1) { animation-delay: 0.02s; }
  .quest-card:nth-child(2) { animation-delay: 0.04s; }
  .quest-card:nth-child(3) { animation-delay: 0.06s; }
  .quest-card:nth-child(4) { animation-delay: 0.08s; }
  .quest-card:nth-child(5) { animation-delay: 0.1s; }
  .quest-card:nth-child(6) { animation-delay: 0.12s; }

  /* ── SIDE PANEL ── */
  .layout { display: flex; gap: 24px; }
  .sidebar {
    width: 240px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .sidebar-section {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .sidebar-title {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold-dim);
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    background: rgba(200,168,75,0.04);
  }
  .sidebar-item {
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.82rem;
  }
  .sidebar-item:last-child { border-bottom: none; }
  .sidebar-item:hover { background: rgba(200,168,75,0.05); }
  .sidebar-item.active { background: rgba(200,168,75,0.08); color: var(--gold-light); }
  .sidebar-item-count {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    color: var(--text-dim);
    background: var(--bg-dark);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 1px 5px;
  }
  .content { flex: 1; min-width: 0; }

  @media (max-width: 900px) {
    .sidebar { display: none; }
    .layout { display: block; }
  }
  @media (max-width: 600px) {
    #quest-container.grid-view {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="header-emblem">⚔️</div>
  <h1 class="site-title">Vanilla Dungeon Quest<br>Compendium</h1>
  <p class="site-subtitle">Classic World of Warcraft · All Instances · All Quests</p>
  <div class="header-divider">
    <div class="header-divider-icon">✦</div>
  </div>
</header>

<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" type="text" id="searchInput" placeholder="Search quests, NPCs, locations…">
  </div>
  <div class="filter-group" id="filterGroup">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="has-items">Has Gear</button>
    <button class="filter-btn" data-filter="has-rewards">Has Rewards</button>
    <button class="filter-btn" data-filter="completed">Completed</button>
    <button class="filter-btn" data-filter="incomplete">Incomplete</button>
  </div>
  <div class="controls-right">
    <div class="quest-count" id="questCount"><span id="visibleCount">0</span> quests</div>
    <button class="view-btn active" id="gridViewBtn" title="Grid view">⊞</button>
    <button class="view-btn" id="listViewBtn" title="List view">☰</button>
  </div>
</div>

<nav class="dungeon-tabs" id="dungeonTabs"></nav>

<div class="main">
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-title">⚔ By Location</div>
        <div id="locationList"></div>

// ═══════════════════════════════════════
//  STATE
// ═══════════════════════════════════════
let currentDungeonId = 'rfc';
let currentFilter = 'all';
let currentView = 'grid';
let searchQuery = '';
let completed = JSON.parse(localStorage.getItem('wow_completed') || '{}');
let locationFilter = null;

// ═══════════════════════════════════════
//  INIT
// ═══════════════════════════════════════
function init() {
  buildDungeonTabs();
  buildFilterBtns();
  bindControls();
  selectDungeon('rfc');
}

// ═══════════════════════════════════════
//  BUILD TABS
// ═══════════════════════════════════════
function buildDungeonTabs() {
  const nav = document.getElementById('dungeonTabs');
  DUNGEONS.forEach(d => {
    const tab = document.createElement('div');
    tab.className = 'dungeon-tab' + (d.id === currentDungeonId ? ' active' : '');
    tab.dataset.id = d.id;
    tab.innerHTML = `${d.icon} ${d.abbr}<span class="tab-level">${d.levels}</span>`;
    tab.addEventListener('click', () => selectDungeon(d.id));
    nav.appendChild(tab);
  });
}

// ═══════════════════════════════════════
//  SELECT DUNGEON
// ═══════════════════════════════════════
function selectDungeon(id) {
  currentDungeonId = id;
  locationFilter = null;
  document.querySelectorAll('.dungeon-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.id === id);
  });
  const dungeon = DUNGEONS.find(d => d.id === id);
  if (!dungeon) return;
  renderDungeonHeader(dungeon);
  renderSidebar(dungeon);
  renderQuests();
}

// ═══════════════════════════════════════
//  DUNGEON HEADER
// ═══════════════════════════════════════
function renderDungeonHeader(dungeon) {
  document.getElementById('dungeonHeaderIcon').textContent = dungeon.icon;
  document.getElementById('dungeonHeaderName').textContent = dungeon.name;
  const completedCount = dungeon.quests.filter(q => completed[dungeon.id + '::' + q.name]).length;
  document.getElementById('dungeonHeaderMeta').innerHTML = `
    <span class="dungeon-meta-item">LEVELS<strong>${dungeon.levels}</strong></span>
    <span class="dungeon-meta-item">FACTION<strong>${dungeon.faction}</strong></span>
    <span class="dungeon-meta-item">LOCATION<strong>${dungeon.location}</strong></span>
    <span class="dungeon-meta-item">QUESTS<strong>${dungeon.quests.length}</strong></span>
  `;
  const pct = dungeon.quests.length ? (completedCount / dungeon.quests.length * 100) : 0;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressFraction').textContent = `${completedCount} / ${dungeon.quests.length}`;
  renderStatsBar(dungeon);
}

// ═══════════════════════════════════════
//  STATS BAR
// ═══════════════════════════════════════
function renderStatsBar(dungeon) {
  const totalXP = dungeon.quests.reduce((s, q) => s + (q.xp || 0), 0);
  const questsWithItems = dungeon.quests.filter(q => q.items.length > 0).length;
  const questsWithRewards = dungeon.quests.filter(q => q.rewards).length;
  const completedCount = dungeon.quests.filter(q => completed[dungeon.id + '::' + q.name]).length;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-item">
      <div class="stat-num">${dungeon.quests.length}</div>
      <div class="stat-label">Total Quests</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <div class="stat-num" style="color:#84d4a0">${totalXP.toLocaleString()}</div>
      <div class="stat-label">Total XP</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <div class="stat-num" style="color:#c8a0d4">${questsWithItems}</div>
      <div class="stat-label">Gear Rewards</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <div class="stat-num" style="color:var(--green-uncommon)">${questsWithRewards}</div>
      <div class="stat-label">Other Rewards</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <div class="stat-num" style="color:var(--gold)">${completedCount}</div>
      <div class="stat-label">Completed</div>
    </div>
  `;
}

// ═══════════════════════════════════════
//  SIDEBAR
// ═══════════════════════════════════════
function renderSidebar(dungeon) {
  // Locations
  const locs = [...new Set(dungeon.quests.map(q => q.startLoc.split(',')[0].trim()))];
  const locList = document.getElementById('locationList');
  locList.innerHTML = '';
  locs.forEach(loc => {
    const count = dungeon.quests.filter(q => q.startLoc.startsWith(loc)).length;
    const item = document.createElement('div');
    item.className = 'sidebar-item' + (locationFilter === loc ? ' active' : '');
    item.innerHTML = `<span>${loc}</span><span class="sidebar-item-count">${count}</span>`;
    item.addEventListener('click', () => {
      locationFilter = locationFilter === loc ? null : loc;
      renderSidebar(dungeon);
      renderQuests();
    });
    locList.appendChild(item);
  });

  // Prequests
  const pqs = dungeon.quests.filter(q => q.prequest);
  const pqList = document.getElementById('prequestList');
  pqList.innerHTML = '';
  if (pqs.length === 0) {
    pqList.innerHTML = '<div class="sidebar-item" style="font-style:italic;color:var(--text-dim);font-size:0.78rem">None for this dungeon</div>';
  } else {
    pqs.forEach(q => {
      const item = document.createElement('div');
      item.className = 'sidebar-item';
      item.innerHTML = `<span style="font-size:0.78rem;color:var(--text-main)">${q.name}</span>`;
      item.title = `Requires: ${q.prequest}`;
      pqList.appendChild(item);
    });
  }
}

// ═══════════════════════════════════════
//  RENDER QUESTS
// ═══════════════════════════════════════
function renderQuests() {
  const dungeon = DUNGEONS.find(d => d.id === currentDungeonId);
  if (!dungeon) return;
  const container = document.getElementById('quest-container');
  container.className = currentView === 'grid' ? 'grid-view' : 'list-view';

  let quests = dungeon.quests.filter(q => {
    const key = dungeon.id + '::' + q.name;
    const isComplete = !!completed[key];
    if (currentFilter === 'has-items') return q.items.length > 0;
    if (currentFilter === 'has-rewards') return !!q.rewards;
    if (currentFilter === 'completed') return isComplete;
    if (currentFilter === 'incomplete') return !isComplete;
    return true;
  });

  if (locationFilter) {
    quests = quests.filter(q => q.startLoc.startsWith(locationFilter));
  }

  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    quests = quests.filter(quest =>
      quest.name.toLowerCase().includes(q) ||
      quest.startNpc.toLowerCase().includes(q) ||
      quest.endNpc.toLowerCase().includes(q) ||
      quest.startLoc.toLowerCase().includes(q) ||
      quest.endLoc.toLowerCase().includes(q) ||
      quest.items.some(i => i.toLowerCase().includes(q)) ||
      quest.notes.toLowerCase().includes(q)
    );
  }

  document.getElementById('visibleCount').textContent = quests.length;
  container.innerHTML = '';

  if (quests.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">📜</div>
        <div class="empty-state-text">NO QUESTS FOUND</div>
        <div style="margin-top:8px;font-size:0.78rem;color:var(--text-dim)">Adjust your search or filters</div>
      </div>`;
    return;
  }

  quests.forEach(quest => {
    const key = dungeon.id + '::' + quest.name;
    const isComplete = !!completed[key];
    const card = document.createElement('div');
    card.className = 'quest-card' + (isComplete ? ' completed' : '');

    const itemsHtml = quest.items.length
      ? `<div class="quest-row"><span class="quest-label">Items</span><span class="quest-value items">${quest.items.join('<br>')}</span></div>`
      : '';
    const rewardHtml = quest.rewards
      ? `<div class="quest-row"><span class="quest-label">Reward</span><span class="quest-value reward">${quest.rewards}</span></div>`
      : '';
    const prequestHtml = quest.prequest
      ? `<div class="quest-row"><span class="quest-label">Req.</span><span class="quest-value prequest">${quest.prequest}</span></div>`
      : '';
    const notesHtml = quest.notes
      ? `<div class="quest-row"><span class="quest-label">Note</span><span class="quest-value note">${quest.notes}</span></div>`
      : '';

    card.innerHTML = `
      <div class="quest-card-header">
        <div class="quest-checkbox">${isComplete ? '✓' : ''}</div>
        <div class="quest-name">${quest.name}</div>
        ${quest.levels ? `<div class="quest-level-badge">Lv ${quest.levels}</div>` : ''}
      </div>
      <div class="quest-card-body">
        <div class="quest-row">
          <span class="quest-label">Start</span>
          <span class="quest-value">${quest.startNpc} <span class="location">— ${quest.startLoc}</span></span>
        </div>
        ${quest.endNpc !== quest.startNpc ? `
        <div class="quest-row">
          <span class="quest-label">Turn in</span>
          <span class="quest-value">${quest.endNpc} <span class="location">— ${quest.endLoc}</span></span>
        </div>` : ''}
        ${prequestHtml}
        ${itemsHtml}
        ${rewardHtml}
        ${notesHtml}
      </div>
      <div class="quest-card-footer">
        ${quest.xp ? `<div class="xp-pill">⭐ ${quest.xp.toLocaleString()} XP</div>` : ''}
        ${quest.rewards ? `<div class="reward-pill">🎁 ${quest.rewards}</div>` : ''}
        <button class="complete-btn" data-key="${key}">${isComplete ? '↩ Undo' : '✓ Complete'}</button>
      </div>
    `;

    // Toggle expand in list view
    card.addEventListener('click', (e) => {
      if (e.target.classList.contains('complete-btn')) return;
      if (currentView === 'list') card.classList.toggle('expanded');
    });

    // Complete button
    const btn = card.querySelector('.complete-btn');
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      completed[key] = !completed[key];
      if (!completed[key]) delete completed[key];
      localStorage.setItem('wow_completed', JSON.stringify(completed));
      renderDungeonHeader(dungeon);
      renderQuests();
    });

    container.appendChild(card);
  });
}

// ═══════════════════════════════════════
//  CONTROLS
// ═══════════════════════════════════════
function buildFilterBtns() {}

function bindControls() {
  document.getElementById('searchInput').addEventListener('input', (e) => {
    searchQuery = e.target.value.trim();
    renderQuests();
  });

  document.getElementById('filterGroup').addEventListener('click', (e) => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    currentFilter = btn.dataset.filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderQuests();
  });

  document.getElementById('gridViewBtn').addEventListener('click', () => {
    currentView = 'grid';
    document.getElementById('gridViewBtn').classList.add('active');
    document.getElementById('listViewBtn').classList.remove('active');
    renderQuests();
  });

  document.getElementById('listViewBtn').addEventListener('click', () => {
    currentView = 'list';
    document.getElementById('listViewBtn').classList.add('active');
    document.getElementById('gridViewBtn').classList.remove('active');
    renderQuests();
  });
}

init();
</script>
